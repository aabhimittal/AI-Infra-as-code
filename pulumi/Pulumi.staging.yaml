# Staging stack config: mirrors prod topology at reduced scale so it can
# catch infra regressions before they hit production, without prod cost.
# - one NAT gateway per AZ (matches prod's HA networking)
# - multi_az disabled for RDS (cost trade-off; prod has it enabled)
# - moderate node group (desired 2)
config:
  aws:region: us-east-1
  ai-infra-as-code:project: ai-infra-demo
  ai-infra-as-code:region: us-east-1
  ai-infra-as-code:environment: staging
  ai-infra-as-code:network:
    vpc_cidr: 10.1.0.0/16
    az_count: 2
    single_nat_gateway: false
  ai-infra-as-code:kubernetes:
    version: "1.29"
    node_instance_type: t3.large
    node_min: 2
    node_max: 4
    node_desired: 2
  ai-infra-as-code:database:
    engine: postgres
    engine_version: "15.4"
    instance_class: db.t3.large
    allocated_storage_gb: 50
    multi_az: false
  ai-infra-as-code:load_balancer:
    type: application
    internet_facing: true
  ai-infra-as-code:tags:
    Team: platform
    CostCenter: staging
